name: Build

on:
  push:
    branches: [main]
    tags:
      - '*'
  pull_request:
    branches: [main]

env:
  PLUGIN_NAME: obs-output-screenshot

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  macos:
    name: macOS (universal)
    runs-on: macos-14          # Apple Silicon runner; builds universal binary
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install OBS deps via Homebrew
        run: |
          brew install cmake ninja
          # OBS provides a pre-built framework for plugin development
          OBS_VERSION=31.0.0
          curl -L -o obs-deps.tar.xz \
            "https://github.com/obsproject/obs-deps/releases/download/${OBS_VERSION}/macos-deps-${OBS_VERSION}-arm64.tar.xz" \
            || true
          # We use the obs-plugintemplate CI approach: build against OBS source
          brew install --cask obs   # gives us the OBS framework headers

      - name: Build (macOS)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DOBS_BUNDLE_CODESIGN_IDENTITY="-"
          cmake --build build --config RelWithDebInfo

      - name: Package (macOS)
        run: |
          mkdir -p package/obs-plugins/mac
          cp build/obs-output-screenshot.dylib package/obs-plugins/mac/
          cd package
          zip -r "../${{ env.PLUGIN_NAME }}-macos.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-macos
          path: ${{ env.PLUGIN_NAME }}-macos.zip

  # ── Windows ────────────────────────────────────────────────────────────────
  windows:
    name: Windows (x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install OBS deps
        run: |
          $OBS_VERSION = "31.0.0"
          $url = "https://github.com/obsproject/obs-studio/releases/download/${OBS_VERSION}/OBS-Studio-${OBS_VERSION}-Windows.zip"
          Invoke-WebRequest -Uri $url -OutFile obs.zip
          Expand-Archive -Path obs.zip -DestinationPath obs-studio

          # Download obs-dev headers
          $devUrl = "https://github.com/obsproject/obs-studio/releases/download/${OBS_VERSION}/OBS-Studio-${OBS_VERSION}-dev-x64-windows.zip"
          Invoke-WebRequest -Uri $devUrl -OutFile obs-dev.zip
          Expand-Archive -Path obs-dev.zip -DestinationPath obs-dev
        shell: pwsh

      - name: Build (Windows)
        run: |
          cmake -S . -B build ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -Dlibobs_DIR="obs-dev/cmake" ^
            -Dobs-websocket-api_DIR="obs-dev/cmake"
          cmake --build build --config RelWithDebInfo
        shell: cmd

      - name: Package (Windows)
        run: |
          mkdir package\obs-plugins\64bit
          copy build\RelWithDebInfo\obs-output-screenshot.dll package\obs-plugins\64bit\
          powershell Compress-Archive -Path package\* -DestinationPath ${{ env.PLUGIN_NAME }}-windows.zip
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows
          path: ${{ env.PLUGIN_NAME }}-windows.zip

  # ── Release (on tag push) ──────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/${{ env.PLUGIN_NAME }}-macos/${{ env.PLUGIN_NAME }}-macos.zip
            artifacts/${{ env.PLUGIN_NAME }}-windows/${{ env.PLUGIN_NAME }}-windows.zip
          generate_release_notes: true
