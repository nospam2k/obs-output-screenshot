name: Build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

env:
  PLUGIN_NAME: obs-output-screenshot
  OBS_VERSION: 31.0.0
  OBS_DEPS_TAG: 2024-09-12

jobs:
  # ── macOS ─────────────────────────────────────────────────────────────────────
  # Headers come straight from the OBS source tarball (the DMG has no dev headers).
  # -undefined dynamic_lookup lets OBS resolve libobs symbols at load time,
  # so we don't need to link against libobs at all — headers are enough.
  macos:
    name: macOS (arm64 + x86_64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja

      - name: Download OBS headers from source
        run: |
          curl -sSL \
            "https://github.com/obsproject/obs-studio/archive/refs/tags/${{ env.OBS_VERSION }}.tar.gz" \
            -o obs-src.tar.gz
          mkdir -p obs-headers
          tar xzf obs-src.tar.gz -C obs-headers --strip-components=2 \
            "obs-studio-${{ env.OBS_VERSION }}/libobs"
          # obsconfig.h is cmake-generated; create a minimal macOS version manually
          cat > obs-headers/obsconfig.h << 'EOF'
          #pragma once
          /* #undef OBS_DATA_PATH */
          /* #undef OBS_PLUGIN_PATH */
          /* #undef OBS_PLUGIN_DESTINATION */
          /* #undef GIO_FOUND */
          /* #undef PULSEAUDIO_FOUND */
          /* #undef XCB_XINPUT_FOUND */
          /* #undef ENABLE_WAYLAND */
          #define OBS_RELEASE_CANDIDATE 0
          #define OBS_BETA 0
          EOF

      - name: Build plugin
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DLIBOBS_INCLUDE_DIR="${{ github.workspace }}/obs-headers"
          cmake --build build

      - name: Package
        run: |
          BUNDLE="package/${{ env.PLUGIN_NAME }}.plugin/Contents"
          mkdir -p "$BUNDLE/MacOS"
          cp "build/${{ env.PLUGIN_NAME }}.dylib" "$BUNDLE/MacOS/${{ env.PLUGIN_NAME }}"
          cp "package/macos/Info.plist" "$BUNDLE/Info.plist"
          zip -r "${{ env.PLUGIN_NAME }}-macos.zip" "package/${{ env.PLUGIN_NAME }}.plugin"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-macos
          path: ${{ env.PLUGIN_NAME }}-macos.zip

  # ── Windows ───────────────────────────────────────────────────────────────────
  # Get obs.dll from the official Windows portable zip, generate obs.lib from it
  # using MSVC tools (no OBS source build needed), and pull headers from source.
  windows:
    name: Windows (x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache OBS dev files
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-dev
          key: obs-windows-dev-${{ env.OBS_VERSION }}

      - name: Download OBS Windows portable (for obs.dll)
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest `
            "https://github.com/obsproject/obs-studio/releases/download/$env:OBS_VERSION/OBS-Studio-$env:OBS_VERSION-Windows.zip" `
            -OutFile obs.zip
          Expand-Archive obs.zip -DestinationPath obs-portable
        shell: pwsh

      - name: Generate obs.lib from obs.dll
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          $dll = Get-ChildItem -Path obs-portable -Recurse -Filter obs.dll | Select-Object -First 1
          Write-Host "Using: $($dll.FullName)"
          $exports = dumpbin /exports $dll.FullName |
            Select-String '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)' |
            ForEach-Object { $_.Matches[0].Groups[1].Value }
          Write-Host "Exports found: $($exports.Count)"
          ("LIBRARY obs", "EXPORTS") + $exports | Out-File -Encoding ASCII obs.def
          lib /def:obs.def /out:obs.lib /machine:x64 /nologo
          New-Item -ItemType Directory -Force obs-dev\lib
          Copy-Item obs.lib obs-dev\lib\
        shell: pwsh

      - name: Download OBS headers from source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest `
            "https://github.com/obsproject/obs-studio/archive/refs/tags/$env:OBS_VERSION.zip" `
            -OutFile obs-src.zip
          Expand-Archive obs-src.zip -DestinationPath obs-src
          New-Item -ItemType Directory -Force obs-dev\include
          Copy-Item -Recurse "obs-src\obs-studio-$env:OBS_VERSION\libobs\*" obs-dev\include\
          # obsconfig.h is cmake-generated; create a minimal version manually
          @"
          #pragma once
          /* #undef OBS_DATA_PATH */
          /* #undef OBS_PLUGIN_PATH */
          /* #undef OBS_PLUGIN_DESTINATION */
          /* #undef GIO_FOUND */
          /* #undef PULSEAUDIO_FOUND */
          /* #undef XCB_XINPUT_FOUND */
          /* #undef ENABLE_WAYLAND */
          #define OBS_RELEASE_CANDIDATE 0
          #define OBS_BETA 0
          "@ | Out-File -Encoding UTF8 obs-dev\include\obsconfig.h
        shell: pwsh

      - name: Build plugin
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DLIBOBS_INCLUDE_DIR="${{ github.workspace }}\obs-dev\include" `
            -DLIBOBS_LIB="${{ github.workspace }}\obs-dev\lib\obs.lib"
          cmake --build build --config RelWithDebInfo
        shell: pwsh

      - name: Package
        run: |
          New-Item -ItemType Directory -Force "package\obs-plugins\64bit"
          Copy-Item "build\RelWithDebInfo\obs-output-screenshot.dll" "package\obs-plugins\64bit\"
          Compress-Archive -Path "package\*" -DestinationPath "${{ env.PLUGIN_NAME }}-windows.zip"
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows
          path: ${{ env.PLUGIN_NAME }}-windows.zip

  # ── Release (on tag push) ─────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/${{ env.PLUGIN_NAME }}-macos/${{ env.PLUGIN_NAME }}-macos.zip
            artifacts/${{ env.PLUGIN_NAME }}-windows/${{ env.PLUGIN_NAME }}-windows.zip
          generate_release_notes: true
