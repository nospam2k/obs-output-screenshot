name: Build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

env:
  PLUGIN_NAME: obs-output-screenshot
  OBS_VERSION: 31.0.0
  OBS_DEPS_TAG: 2024-09-12

jobs:
  # ── macOS ─────────────────────────────────────────────────────────────────────
  # Extract libobs headers directly from the official OBS macOS DMG.
  # No source build needed — -undefined dynamic_lookup lets OBS resolve symbols
  # at load time, so we only need headers to compile against.
  macos:
    name: macOS (arm64 + x86_64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja

      - name: Download OBS macOS DMG and extract framework
        run: |
          curl -sSL \
            "https://github.com/obsproject/obs-studio/releases/download/${{ env.OBS_VERSION }}/OBS-Studio-${{ env.OBS_VERSION }}-macOS-Apple.dmg" \
            -o obs.dmg
          hdiutil attach obs.dmg -mountpoint /tmp/OBS -nobrowse -quiet
          cp -R "/tmp/OBS/OBS.app/Contents/Frameworks/libobs.framework" /tmp/libobs.framework
          hdiutil detach /tmp/OBS -quiet

      - name: Build plugin
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DLIBOBS_INCLUDE_DIR="/tmp/libobs.framework/Headers"
          cmake --build build

      - name: Package
        run: |
          mkdir -p "package/${{ env.PLUGIN_NAME }}/bin"
          cp "build/${{ env.PLUGIN_NAME }}.dylib" "package/${{ env.PLUGIN_NAME }}/bin/"
          zip -r "${{ env.PLUGIN_NAME }}-macos.zip" package/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-macos
          path: ${{ env.PLUGIN_NAME }}-macos.zip

  # ── Windows ───────────────────────────────────────────────────────────────────
  # Build libobs from source using prebuilt obs-deps (FFmpeg, jansson, etc.).
  # Locate headers and obs.lib by path after install — no cmake config needed.
  windows:
    name: Windows (x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache OBS build
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-install
          key: obs-windows-${{ env.OBS_VERSION }}-${{ env.OBS_DEPS_TAG }}

      - name: Download obs-deps
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest `
            "https://github.com/obsproject/obs-deps/releases/download/$env:OBS_DEPS_TAG/windows-deps-$env:OBS_DEPS_TAG-x64.zip" `
            -OutFile obs-deps.zip
          Expand-Archive obs-deps.zip -DestinationPath obs-deps
        shell: pwsh

      - name: Download OBS Studio source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest `
            "https://github.com/obsproject/obs-studio/archive/refs/tags/$env:OBS_VERSION.zip" `
            -OutFile obs-src.zip
          Expand-Archive obs-src.zip -DestinationPath .
          Rename-Item "obs-studio-$env:OBS_VERSION" obs-studio
        shell: pwsh

      - name: Build libobs
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          cmake -S obs-studio -B obs-build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}\obs-deps" `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_UI=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_BROWSER=OFF `
            -DENABLE_AJA=OFF `
            -DENABLE_VST=OFF `
            -DENABLE_VLC=OFF `
            -DENABLE_WEBSOCKET=OFF
          cmake --build obs-build --target libobs --config RelWithDebInfo
          cmake --install obs-build --prefix "${{ github.workspace }}\obs-install" --config RelWithDebInfo
        shell: pwsh

      - name: Locate libobs headers and import library
        run: |
          $hdr = Get-ChildItem -Path obs-install -Recurse -Filter "obs-module.h" | Select-Object -First 1
          $lib = Get-ChildItem -Path obs-install -Recurse -Filter "obs.lib"       | Select-Object -First 1
          if (-not $hdr) { Write-Error "obs-module.h not found in obs-install"; exit 1 }
          if (-not $lib) { Write-Error "obs.lib not found in obs-install";       exit 1 }
          "LIBOBS_INCLUDE_DIR=$($hdr.DirectoryName)" | Out-File -Append $env:GITHUB_ENV
          "LIBOBS_LIB=$($lib.FullName)"              | Out-File -Append $env:GITHUB_ENV
        shell: pwsh

      - name: Build plugin
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DLIBOBS_INCLUDE_DIR="${{ env.LIBOBS_INCLUDE_DIR }}" `
            -DLIBOBS_LIB="${{ env.LIBOBS_LIB }}"
          cmake --build build --config RelWithDebInfo
        shell: pwsh

      - name: Package
        run: |
          New-Item -ItemType Directory -Force "package\obs-plugins\64bit"
          Copy-Item "build\RelWithDebInfo\obs-output-screenshot.dll" "package\obs-plugins\64bit\"
          Compress-Archive -Path "package\*" -DestinationPath "${{ env.PLUGIN_NAME }}-windows.zip"
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows
          path: ${{ env.PLUGIN_NAME }}-windows.zip

  # ── Release (on tag push) ─────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/${{ env.PLUGIN_NAME }}-macos/${{ env.PLUGIN_NAME }}-macos.zip
            artifacts/${{ env.PLUGIN_NAME }}-windows/${{ env.PLUGIN_NAME }}-windows.zip
          generate_release_notes: true
